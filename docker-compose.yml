services:
  db:
    image: postgres:16
    container_name: companion-ui-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: companion
    ports:
      - "5432:5432"
    volumes:
      - companion-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d companion"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  companion-pgdata:
